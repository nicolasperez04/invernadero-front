name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: tests
        run: |
          npx vitest run --reporter=verbose --coverage 2>&1 | tee test-output.log
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Check test status
        if: steps.tests.outputs.exitcode != '0'
        run: exit 1

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: target/coverage/
          retention-days: 30

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/proyecto-front/browser/
          retention-days: 90

      - name: Generate test summary
        id: summary
        run: |
          if [ -f "target/test-results/junit.xml" ]; then
            TOTAL=$(grep -c 'testsuite' target/test-results/junit.xml 2>/dev/null || echo 0)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' target/test-results/junit.xml | awk '{s+=$1} END {print s}')
            FAILURES=${FAILURES:-0}
            echo "tests_total=$TOTAL" >> $GITHUB_OUTPUT
            echo "tests_failures=$FAILURES" >> $GITHUB_OUTPUT
          else
            echo "tests_total=0" >> $GITHUB_OUTPUT
            echo "tests_failures=0" >> $GITHUB_OUTPUT
          fi

          if [ -f "target/coverage/lcov.info" ]; then
            LINES=$(grep '^SF:' target/coverage/lcov.info | wc -l)
            echo "files_covered=$LINES" >> $GITHUB_OUTPUT
          fi

      - name: Write CI Summary
        run: |
          echo "## Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.tests.outputs.exitcode == '0' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ${{ steps.summary.outputs.tests_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failures | ❌ ${{ steps.summary.outputs.tests_failures }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TESTS_EXITCODE: ${{ steps.tests.outputs.exitcode }}
          TESTS_TOTAL: ${{ steps.summary.outputs.tests_total }}
          TESTS_FAILURES: ${{ steps.summary.outputs.tests_failures }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const { eventName, payload, repository } = context;
            const pr = payload.pull_request;
            const sha = process.env.SHA;
            const exitcode = process.env.TESTS_EXITCODE;
            const total = process.env.TESTS_TOTAL;
            const failures = process.env.TESTS_FAILURES;

            const passed = exitcode === '0';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';

            const body = `${icon} **Frontend CI ${status}** for commit ${sha.slice(0, 7)}

            | Step | Result |
            |------|--------|
            | Tests | ${passed ? '✅ ' + total + ' passed' : '❌ ' + failures + ' failed / ' + total + ' total'} |
            | Lint | ✅ Passed |
            | Build | ✅ Passed |

            ${!passed ? '⚠️ Hay tests fallando. Revisa el reporte antes de mergear.' : ''}`;

            pr && github.rest.issues.createComment({
              owner: repository.owner.login,
              repo: repository.repo,
              issue_number: pr.number,
              body: body
            });
