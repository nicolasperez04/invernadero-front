name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'package-lock.json'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --no-watch --no-watch-on-ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/proyecto-front/browser/
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { eventName, payload, repository } = context;
            const pr = payload.pull_request;
            const conclusion = '${{ job.status }}';
            const sha = '${{ github.sha }}';

            const icon = conclusion === 'success' ? '✅' : '❌';
            const status = conclusion === 'success' ? 'passed' : 'failed';

            const body = `${icon} **CI ${status}** for commit ${sha.slice(0, 7)}\n\n` +
              '- Tests: passed\n' +
              '- Lint: passed\n' +
              '- Build: passed\n\n' +
              '> Build artifact available for download';

            pr && github.rest.issues.createComment({
              owner: repository.owner.login,
              repo: repository.repo,
              issue_number: pr.number,
              body: body
            });
