<div class="login-container">
  <div class="login-card">
    <div class="login-title">
      <span>🌾</span>
      {{ 'login.title' | translate }}
    </div>
    <p class="login-subtitle">{{ 'login.subtitle' | translate }}</p>

    <form class="login-form" (ngSubmit)="login()" #loginForm="ngForm">

      <div *ngIf="errorMessage" class="error-message">
        <mat-icon>error</mat-icon>
        {{ errorMessage }}
      </div>

      <sigma-input
        label="{{ 'login.email' | translate }}"
        type="email"
        placeholder="usuario@ejemplo.com"
        [(ngModel)]="email"
        name="email"
        [disabled]="loading"
        [required]="true"
      ></sigma-input>

      <div class="password-field">
        <sigma-input
          label="{{ 'login.password' | translate }}"
          [type]="hidePassword ? 'password' : 'text'"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          [disabled]="loading"
          [required]="true"
        ></sigma-input>
        <button
          type="button"
          class="toggle-password"
          (click)="togglePasswordVisibility()"
          [disabled]="loading"
        >
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <button sigma-btn variant="primary" type="submit" style="width:100%" [disabled]="!email || !password" [loading]="loading">
        {{ 'login.button' | translate }}
      </button>
    </form>
  </div>
</div>
