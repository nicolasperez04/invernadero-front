<div class="layout" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- TOOLBAR -->
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="toolbar-menu-btn" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <mat-icon>menu</mat-icon>
      </button>
      <h2 class="toolbar-title" *ngIf="pageTitle$ | async as title">{{ title | translate }}</h2>
    </div>

    <div class="toolbar-right">
      <app-notification-bell></app-notification-bell>

      <div class="lang-switcher">
        <button class="lang-btn" [class.active]="currentLang() === 'es'" (click)="setLang('es')">
          ES
        </button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" [class.active]="currentLang() === 'en'" (click)="setLang('en')">
          EN
        </button>
      </div>

      <div class="user-info">
        <span class="user-avatar">{{ username.charAt(0).toUpperCase() }}</span>
        <span class="user-name">{{ username }}</span>
      </div>

      <button class="logout-btn" (click)="logout()" [attr.title]="'nav.logout' | translate">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </header>

  <!-- BODY -->
  <div class="body">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-text">{{ 'nav.title' | translate }}</span>
      </div>

      <div class="sidebar-nav">
        <a
          *ngFor="let item of filteredNavItems"
          class="nav-item"
          [class.active]="isActive(item.path)"
          (click)="navigate(item.path)"
          tabindex="0"
          (keydown.enter)="navigate(item.path)"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label | translate }}</span>
        </a>
      </div>

      <div class="sidebar-footer">
        <span class="sidebar-collapse-hint">{{ 'nav.menu' | translate }}</span>
      </div>
    </nav>

    <!-- CONTENT -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
